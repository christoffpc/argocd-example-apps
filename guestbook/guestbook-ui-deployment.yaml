apiVersion: apps/v1
kind: Deployment
metadata:
  name: guestbook-ui
spec:
  replicas: 3
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: guestbook-ui
  template:
    metadata:
      labels:
        app: guestbook-ui
    spec:
      containers:
        # - image: gcr.io/google-samples/gb-frontend:v5
        - image: php:8-apache
          name: guestbook-ui
          ports:
            - containerPort: 80
          env:
            - name: GITOPS_LAB
              value: "true"
